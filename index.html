<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valentine Link Generator</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background-color: #ffeef2; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 25px; 
            text-align: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 380px; /* মোবাইলের জন্য পারফেক্ট সাইজ */
        }
        
        h2 { color: #333; font-size: 22px; margin-bottom: 10px; }
        .subtitle { color: #ff2d75; font-size: 14px; margin-bottom: 20px; }

        .form-group { text-align: left; margin-bottom: 20px; }
        label { font-weight: bold; color: #555; font-size: 14px; display: block; margin-bottom: 8px; }
        
        input { 
            width: 100%; 
            padding: 12px 15px; 
            border: 2px solid #ffb6c1; 
            border-radius: 12px; 
            outline: none; 
            font-size: 16px;
        }

        .gen-btn { 
            background: #ff2d75; 
            color: white; 
            width: 100%; 
            padding: 14px; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
        }

        #link-display { 
            margin-top: 20px; 
            padding: 15px; 
            background: #fdf0f4; 
            border-radius: 12px; 
            border: 1px dashed #ff2d75;
            display: none; 
        }
        
        #generatedUrl { 
            display: block;
            margin-top: 10px;
            font-size: 13px; 
            color: #333;
            word-break: break-all; /* বড় লিঙ্ক ভেঙে নিচে আসবে */
            background: #fff;
            padding: 10px;
            border-radius: 8px;
        }

        /* প্রপোজাল পেজ ডিজাইন */
        h1 { color: #d63384; font-size: 24px; margin: 20px 0; line-height: 1.4; }
        .btn-container { 
            display: flex; 
            flex-direction: column; /* মোবাইলে বাটন উপর-নিচে থাকবে */
            gap: 10px; 
            margin-top: 20px; 
        }
        .action-btn { 
            width: 100%;
            padding: 12px; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 18px; 
        }
        #yesBtn { background: #ff2d75; color: white; }
        #noBtn { background: #ddd; color: #333; position: relative; }
        
        .hidden { display: none !important; }

        /* ছোট স্ক্রিনের জন্য ফিক্স */
        @media (min-width: 300px) {
            .btn-container { flex-direction: row; } /* একটু বড় স্ক্রিন হলে পাশাপাশি আসবে */
            .action-btn { flex: 1; }
        }
    </style>
</head>
<body>

    <div id="generator-screen" class="card">
        <h2>💖 Link Generator</h2>
        <p class="subtitle">আপনার কাস্টম মেসেজটি লিখুন</p>
        
        <div class="form-group">
            <label>কাকে পাঠাবেন বা কী লিখবেন:</label>
            <input type="text" id="targetName" placeholder="উদা: Lily Marma...">
        </div>
        
        <button class="gen-btn" onclick="generateLink()">✨ Generate Link</button>
        
        <div id="link-display">
            <p style="font-size: 13px; margin:0;">আপনার লিঙ্কটি তৈরি!</p>
            <span id="generatedUrl"></span>
            <p style="font-size: 11px; color: #888; margin-top: 10px;">(লিঙ্কটি কপি করে পাঠিয়ে দিন)</p>
        </div>
    </div>

    <div id="proposal-screen" class="card hidden">
        <img id="main-img" src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpneXp1Mnl0eG9ueXpueXpueXpueXpueXpueXpueXpueXpueXpueZCZ3M9MTY4NDc5OTU0NyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/cLS1cfxvGOPVpf9g3y/giphy.gif" width="120">
        <h1 id="displayMsg"></h1>
        <div class="btn-container">
            <button id="yesBtn" class="action-btn">Yes</button>
            <button id="noBtn" class="action-btn">No</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const nameParam = urlParams.get('msg');

        if (nameParam) {
            document.getElementById('generator-screen').classList.add('hidden');
            document.getElementById('proposal-screen').classList.remove('hidden');
            document.getElementById('displayMsg').innerText = decodeURIComponent(nameParam);
        }

        function generateLink() {
            const msg = document.getElementById('targetName').value;
            if (msg.trim() === "") {
                alert("দয়া করে কিছু একটা লিখুন!");
                return;
            }
            
            const baseUrl = window.location.origin + window.location.pathname;
            const finalUrl = baseUrl + "?msg=" + encodeURIComponent(msg);
            
            document.getElementById('link-display').style.display = "block";
            document.getElementById('generatedUrl').innerText = finalUrl;
            
            navigator.clipboard.writeText(finalUrl);
            alert("লিঙ্কটি কপি হয়েছে!");
        }

        const noBtn = document.getElementById("noBtn");
        const yesBtn = document.getElementById("yesBtn");

        function moveNo() {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            noBtn.style.position = "fixed";
            noBtn.style.left = x + "px";
            noBtn.style.top = y + "px";
        }
        noBtn.addEventListener("mouseover", moveNo);
        noBtn.addEventListener("touchstart", moveNo);

        yesBtn.addEventListener("click", () => {
            document.getElementById("displayMsg").innerText = "I knew it! ❤️😘";
            document.getElementById("main-img").src = "https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpneXp1Mnl0eG9ueXpueXpueXpueXpueXpueXpueXpueXpueXpueZCZ3M9MTY4NDc5OTU0NyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9cw/vXGZ075fC5Hh929yvX/giphy.gif";
            noBtn.style.display = "none";
            yesBtn.style.display = "none";
        });
    </script>
</body>
    </html>
